project_id = "umade"

[functions.create-booking-checkout]
verify_jwt = false

[functions.stripe-webhook-bookings]
verify_jwt = false

[functions.checkout-return]
verify_jwt = false

[functions.provider-connect-onboarding]
verify_jwt = false

[functions.provider-request-payout]
verify_jwt = false

# Lien ouvert depuis un email dans un navigateur : aucun JWT possible.
# La sécurité repose sur le jeton à usage unique (haché, expiration 1h).
[functions.confirm-account-deletion]
verify_jwt = false

# Doit rester protégée : seul l'utilisateur connecté peut demander
# la suppression de SON compte.
[functions.request-account-deletion]
verify_jwt = true

# Appelée par la console Ops avec un secret partagé (ADMIN_STATS_TOKEN),
# pas avec un JWT Supabase : la passerelle rejetterait la requête avant
# que la fonction ne vérifie elle-même le jeton.
[functions.admin-stats]
verify_jwt = false
